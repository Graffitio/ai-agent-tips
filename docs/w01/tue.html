<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 에이전트 팁 · W01 TUE — 4lynx</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sans:'Noto Sans KR',sans-serif;--mono:'JetBrains Mono',monospace;
    --navy-deep:#1B1464;--navy-mid:#2A2082;--blue-brand:#3569B8;
    --blue-light:#8ECAE6;--blue-pale:#C2E2F5;--bg:#F4F7FB;--surface:#FFFFFF;
    --text-primary:#1B1464;--text-secondary:#3D3A6B;--text-muted:#8B8AAF;
    --border:#D8DFEC;--border-light:#E8EDF5;--border-hover:#B0BCDA;
    --radius:10px;--card-hover:0 4px 24px rgba(27,20,100,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--bg);color:var(--text-primary);line-height:1.7;-webkit-font-smoothing:antialiased}
  .container{max-width:680px;margin:0 auto;padding:0 20px}
  header{background:linear-gradient(135deg,#FFF 0%,#E8EEF9 40%,#D4E0F5 100%);padding:0 20px;position:relative}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--navy-deep),var(--blue-brand),var(--blue-light),var(--blue-pale))}
  header .container{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;padding-top:24px;padding-bottom:28px}
  .header-left{flex:1;min-width:260px}
  .logo-area{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
  .logo-img{height:28px;width:auto}
  .logo-divider{color:var(--border);font-size:20px;font-weight:300;margin:0 2px}
  .logo-label{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blue-brand);letter-spacing:0.06em;text-transform:uppercase}
  .issue-meta{font-family:var(--mono);font-size:11px;color:var(--blue-brand);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
  .header-title{font-size:28px;font-weight:900;color:var(--navy-deep);letter-spacing:-0.03em;line-height:1.25}
  .header-sub{font-size:14px;color:var(--text-secondary);margin-top:6px;font-weight:300}
  .header-author{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:10px;letter-spacing:0.04em}
  .header-author span{color:var(--blue-brand);font-weight:600}
  .header-right{text-align:right;padding-top:46px}
  .header-date{font-family:var(--mono);font-size:12px;color:var(--text-muted);line-height:1.5}
  .header-week-badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--navy-deep);background:rgba(27,20,100,0.08);padding:4px 10px;border-radius:4px;margin-top:8px}
  .section-label{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:16px;color:var(--navy-deep)}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .intro{margin-top:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
  .intro p{font-size:14px;line-height:1.85;color:var(--text-secondary)}
  .intro strong{color:var(--navy-deep)}
  .tips{margin-top:28px}
  .tip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:box-shadow 0.2s,border-color 0.2s}
  .tip-card:hover{box-shadow:var(--card-hover);border-color:var(--border-hover)}
  .tip-header{padding:18px 22px;cursor:pointer}
  .tip-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .tip-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.08em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
  .tag-beginner{background:#D1FAE5;color:#047857}
  .tag-intermediate{background:#E0EAFC;color:var(--navy-deep)}
  .tag-advanced{background:#EDE9FE;color:#5B21B6}
  .tip-category{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
  .tip-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue-brand);letter-spacing:0.06em}
  .tip-title{font-size:17px;font-weight:700;line-height:1.5;color:var(--text-primary)}
  .tip-body{max-height:0;overflow:hidden;transition:max-height 0.4s,opacity 0.3s,padding 0.3s;opacity:0;padding:0 22px}
  .tip-body.open{max-height:800px;opacity:1;padding:0 22px 20px}
  .tip-body p{font-size:14px;line-height:1.85;color:var(--text-secondary);margin-bottom:10px}
  .tip-body p:last-child{margin-bottom:0}
  .tip-example{background:#F8F9FC;border:1px solid var(--border-light);border-radius:6px;padding:14px 16px;margin-top:10px}
  .tip-example-label{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue-brand);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
  .tip-example code{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--navy-deep);display:block;white-space:pre-wrap}
  .tip-toggle{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:8px;padding:0 22px 14px;cursor:pointer}
  .insight-box{margin-top:28px;background:linear-gradient(135deg,#EDF1FA,#E0EAFC);border:1px solid #B0C4E8;border-radius:var(--radius);padding:22px 24px}
  .insight-box .section-label{color:var(--navy-mid)}
  .insight-box p{font-size:14px;line-height:1.85;color:var(--navy-deep)}
  .insight-box strong{color:var(--navy-deep);font-weight:700}
  .glossary{margin-top:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px}
  .glossary .section-label{color:var(--blue-brand)}
  .glossary-item{padding:14px 0;border-bottom:1px solid var(--border-light)}
  .glossary-item:last-child{border-bottom:none}
  .glossary-term{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--navy-deep);margin-bottom:4px}
  .glossary-en{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:6px}
  .glossary-def{font-size:13.5px;line-height:1.75;color:var(--text-secondary)}
  footer{margin-top:32px;padding:20px 0 36px;text-align:center;position:relative}
  footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;height:3px;background:linear-gradient(90deg,var(--navy-deep),var(--blue-brand),var(--blue-light),var(--blue-pale))}
  .footer-brand{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.12em;margin-top:12px}
  .footer-note{font-size:12px;color:var(--text-muted);margin-top:6px}
  @media print{.tip-body{max-height:none!important;opacity:1!important;padding:0 22px 20px!important}.tip-toggle{display:none}}
  @media(max-width:480px){.header-title{font-size:22px}.container{padding:0 16px}.header-right{padding-top:0}}
</style>
</head>
